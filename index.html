<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
    <title>BEARS CASINO 🐣</title>
    <link rel="stylesheet" href="style.css?v=7.0">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<!-- Великодній фон -->
<canvas id="easter-bg" style="position:fixed;top:0;left:0;pointer-events:none;z-index:0"></canvas>

<header>
    <div class="logo">BEARS CASINO</div>
    <div class="bal-card"><span id="bal-val">0</span> BB</div>
</header>

<div class="container" style="position:relative;z-index:1">

    <!-- ПЕТ HUD -->
    <div class="pet-hud">
        <div id="p-img" class="pet-hud-emo">🥚</div>
        <canvas id="p-hud-canvas" width="60" height="60" style="border-radius:12px;display:none;flex-shrink:0"></canvas>
        <div style="flex:1">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
                <div id="p-rarity" class="rarity-pill" data-l="noPetRarity">НЕМАЄ</div>
                <div id="p-name" style="font-weight:800;font-size:15px" data-l="noPet">Обери пета</div>
            </div>
            <div class="xp-bar"><div id="xp-f" class="xp-fill"></div></div>
            <div style="display:flex;justify-content:space-between;font-size:11px;font-weight:600;color:#8d99ae">
                <span><span id="pet-bonus-lbl">БОНУС</span> <span id="p-m" style="color:var(--accent)">x1.000</span></span>
                <span>LVL <span id="p-l" style="color:#fff">1</span> → XP</span>
            </div>
        </div>
    </div>

    <!-- ГОЛОВНА -->
    <div id="v-main" class="page">
        <div class="glass">
            <label class="field-label" data-l="chooseGame">ОБЕРИ ГРУ</label>
            <select id="g-sel" onchange="updUI()">
                <option value="f50">⚖️ 50/50 (x1.55)</option>
                <option value="dice">🎲 Кубик (x2.05)</option>
                <option value="wheel">🎡 Колесо (до x1.6)</option>
                <option value="slots">🎰 Слоти (до x5.0)</option>
                <option value="mines">💣 Міни (до x4.0)</option>
                <option value="clown">🐰 Двері Великодня (до x2.4)</option>
                <option value="balloon">🥚 Яйце Удачі (до x2.5)</option>
                <option value="bj">🃏 Блекджек (x2.0)</option>
                <option value="pvp">⚔️ Бій Крашанками</option>
                <option value="plinko">🥚 Кошик Удачі</option>
            </select>

            <div id="ui-dice" style="display:none;margin:14px 0"></div>

            <div id="ui-wheel" style="display:none;text-align:center;padding:8px 0">
                <div style="position:relative;width:220px;height:220px;margin:0 auto 12px">
                    <canvas id="wheel-canvas" width="220" height="220"></canvas>
                    <div style="position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:22px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.9))">▼</div>
                </div>
                <div style="display:flex;justify-content:center;gap:12px;font-size:11px;font-weight:700;flex-wrap:wrap">
                    <span style="color:#e74c3c">🔴 0x 50%</span>
                    <span style="color:#2ecc71">🟢 1.4x 25%</span>
                    <span style="color:#3498db">🔵 1.6x 20%</span>
                    <span style="color:#f59e0b">🟡 🍯🐻 5%</span>
                </div>
            </div>

            <div id="ui-slots" style="display:none;text-align:center;padding:12px 0">
                <div style="display:flex;justify-content:center;gap:10px;margin-bottom:14px">
                    <div class="slot-reel" id="reel-0">🍒</div>
                    <div class="slot-reel" id="reel-1">🍋</div>
                    <div class="slot-reel" id="reel-2">🍊</div>
                </div>
                <div style="font-size:10px;color:#8d99ae;font-weight:600;line-height:1.9">
                    7 7 7 = <b style="color:var(--accent)">x5.0</b> | 💎💎💎 = <b style="color:#a78bfa">x4.0</b> | ⭐⭐⭐ = <b style="color:#38bdf8">x3.0</b><br>
                    3 однакових = <b style="color:#22c55e">x2.0</b> | 2 = <b style="color:#8d99ae">x1.3</b>
                </div>
            </div>

            <div id="ui-mines" style="display:none;padding:8px 0">
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
                    <div style="font-size:12px;color:#8d99ae;font-weight:700;white-space:nowrap">💣 <span id="mines-count-label">3</span></div>
                    <input type="range" id="mines-count" min="1" max="12" value="3" style="flex:1" oninput="updateMinesCount()">
                    <div style="font-size:12px;color:var(--accent);font-weight:700;white-space:nowrap">MAX x<span id="mines-mult-label">1.75</span></div>
                </div>
                <div id="mines-grid" class="mines-grid"></div>
                <div id="mines-ctrl" style="display:none;margin-top:12px">
                    <button class="btn" style="background:var(--success);font-size:14px;padding:12px" onclick="minesCashout()">
                        💰 ЗАБРАТИ · x<span id="mines-curr-mult">1.00</span>
                    </button>
                </div>
            </div>

            <div id="ui-clown" style="display:none;padding:8px 0"></div>
            <div id="ui-balloon" style="display:none;padding:8px 0"></div>
            <div id="ui-pvp" style="display:none;padding:8px 0"></div>
            <div id="ui-plinko" style="display:none;padding:8px 0"></div>

            <div id="ui-bj" style="display:none;text-align:center;padding:12px 0">
                <div id="bj-dealer-lbl" style="font-size:10px;color:#8d99ae;margin-bottom:6px;font-weight:700">ДИЛЕР</div>
                <div id="bj-dc" style="display:flex;justify-content:center;gap:8px;margin-bottom:14px"></div>
                <div id="bj-you-lbl" style="font-size:10px;color:#8d99ae;margin-bottom:6px;font-weight:700">ВИ</div>
                <div id="bj-pc" style="display:flex;justify-content:center;gap:8px"></div>
                <div id="bj-ctrl" style="display:none;gap:10px;margin-top:16px;justify-content:center">
                    <button class="btn-s" id="bj-hit" onclick="bjDo('hit')" style="background:var(--accent);color:var(--btn-txt,#000);min-width:90px;padding:10px">ЩЕ</button>
                    <button class="btn-s" id="bj-stop" onclick="bjDo('stop')" style="background:var(--error);color:#fff;min-width:90px;padding:10px">СТОП</button>
                </div>
            </div>

            <label class="field-label" style="margin-top:4px" data-l="betLbl">СТАВКА</label>
            <input type="number" id="bet-a" value="10" step="1" inputmode="decimal">
            <button class="btn" id="btn-play" onclick="play()" data-l="betBtn">ЗРОБИТИ СТАВКУ</button>
            <div id="g-stat" style="text-align:center;margin-top:14px;font-weight:bold;min-height:44px;font-size:16px"></div>
        </div>
    </div>

    <div id="v-shop" class="page" style="display:none"><div id="shop-list"></div></div>

    <div id="v-inv" class="page" style="display:none">
        <div class="glass">
            <h3 id="inv-heading" style="margin:0 0 14px;color:#fff">🎒 МОЇ ПЕТИ</h3>
            <div id="inv-list"></div>
        </div>
    </div>

    <div id="v-top" class="page" style="display:none">
        <div class="glass">
            <h3 id="top-heading" style="margin:0 0 14px;color:var(--accent)">🏆 ЛІДЕРИ</h3>
            <div id="leaderboard"></div>
        </div>
    </div>

    <div id="v-settings" class="page" style="display:none">
        <div class="glass">
            <h3 id="sett-heading" style="margin:0 0 16px;color:#fff">⚙️ Налаштування</h3>
            <div id="settings-body"></div>
        </div>
    </div>

    <div id="v-admin" class="page" style="display:none">
        <div class="glass">
            <h3 id="admin-heading" style="margin:0 0 14px;color:var(--accent)">⚡ АДМІН</h3>
            <div id="admin-list"></div>
        </div>
    </div>
</div>

<div id="case-modal">
    <h2 id="case-title" style="margin:0 0 20px;text-shadow:0 0 20px var(--accent)">ВІДКРИВАЄМО...</h2>
    <div class="case-roulette">
        <div style="position:absolute;left:50%;top:0;width:3px;height:100%;background:var(--accent);z-index:10;box-shadow:0 0 10px var(--accent)"></div>
        <div id="case-scroll"></div>
    </div>
    <div id="case-res" style="margin-top:24px;font-size:22px;font-weight:bold;text-align:center"></div>
    <button class="btn" style="width:200px;display:none;margin-top:20px;background:var(--success);color:#fff" id="case-close" onclick="closeCase()">✅ ЗАБРАТИ</button>
</div>

<nav style="position:relative;z-index:2">
    <div class="nav-tab active" onclick="tab('main',this)">🎮</div>
    <div class="nav-tab" onclick="tab('shop',this)">📦</div>
    <div class="nav-tab" onclick="tab('inv',this)">🎒</div>
    <div class="nav-tab" onclick="tab('top',this)">🏆</div>
    <div class="nav-tab" onclick="tab('settings',this)">⚙️</div>
    <div id="admin-tab" class="nav-tab" style="display:none" onclick="tab('admin',this)">⚡</div>
</nav>

<script src="petimages.js"></script>
<script src="music.js"></script>
<script src="script.js?v=7.0"></script>
</body>
</html>
