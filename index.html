<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>BEARS CASINO ULTIMATE</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #0d0214; --accent: #ffb703; --glass: rgba(255,255,255,0.08); --border: rgba(255,255,255,0.15); --success: #00f5a0; --error: #ff4d6d; --rare: #3b82f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { margin:0; min-height:100vh; background:var(--bg); color:#fff; padding-bottom: 100px; overflow-x: hidden; }
        
        header { display:flex; justify-content:space-between; align-items:center; padding:15px; background:rgba(13,2,20,0.9); backdrop-filter:blur(10px); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
        .bal-card { background:rgba(255,183,3,0.15); padding:8px 15px; border-radius:15px; border:1px solid var(--accent); color:var(--accent); font-weight:900; }

        .container { max-width:450px; margin:0 auto; padding:15px; display:flex; flex-direction:column; gap:15px; }
        .glass { background:var(--glass); backdrop-filter:blur(15px); border-radius:25px; padding:20px; border:1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* XP & PETS */
        .pet-img { font-size: 50px; filter: drop-shadow(0 0 10px var(--accent)); }
        .xp-bar { height:8px; background:rgba(0,0,0,0.3); border-radius:4px; margin:10px 0; overflow:hidden; }
        .xp-fill { height:100%; background:linear-gradient(90deg, var(--accent), #fb8500); width:0%; transition:0.5s; }

        /* NAV */
        nav { position:fixed; bottom:15px; left:15px; right:15px; height:70px; background:rgba(20,5,30,0.95); backdrop-filter:blur(20px); border-radius:25px; display:flex; justify-content:space-around; align-items:center; border:1px solid var(--border); z-index:1000; }
        .nav-tab { color:#8d99ae; font-size:11px; font-weight:800; text-align:center; cursor:pointer; flex:1; }
        .nav-tab.active { color:var(--accent); }

        /* GAMES UI */
        .wheel-wrap { position:relative; width:180px; height:180px; margin:15px auto; }
        .wheel-main { width:100%; height:100%; border-radius:50%; border:6px solid #1a062d; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); background: conic-gradient(var(--error) 0% 25%, var(--success) 25% 50%, var(--rare) 50% 75%, var(--accent) 75% 100%); }
        .marker { position:absolute; top:-10px; left:50%; transform:translateX(-50%); width:20px; height:25px; background:#fff; clip-path:polygon(50% 100%, 0 0, 100% 0); z-index:10; }
        .card-ui { display:inline-flex; width:35px; height:50px; background:#fff; color:#000; border-radius:6px; align-items:center; justify-content:center; font-weight:900; margin:2px; font-size:16px; }

        select, input { width:100%; padding:12px; border-radius:12px; background:#000; color:#fff; border:1px solid var(--border); margin:5px 0; font-size:16px; }
        .btn { background:linear-gradient(135deg, var(--accent), #fb8500); color:#000; width:100%; padding:15px; border:none; border-radius:18px; font-weight:900; cursor:pointer; }
    </style>
</head>
<body>

<header>
    <div>
        <div id="u-name" style="font-weight:900; font-size:18px">BEARS CASINO</div>
        <div id="u-rank" style="font-size:10px; color:#8d99ae">РАНГ: 1</div>
    </div>
    <div class="bal-card"><span id="bal-val">5000</span> BB</div>
</header>

<div class="container">
    <div id="v-main" class="page">
        <div class="glass" style="display:flex; align-items:center; gap:15px; margin-bottom:10px">
            <div id="p-img" class="pet-img">🥚</div>
            <div style="flex:1">
                <div id="p-rarity" style="font-size:9px; font-weight:900; background:#94a3b8; color:#000; padding:2px 6px; border-radius:4px; display:inline-block">COMMON</div>
                <div id="p-name" style="font-weight:900; font-size:18px">Загадкове Яйце</div>
                <div class="xp-bar"><div id="xp-f" class="xp-fill"></div></div>
                <div style="display:flex; justify-content:space-between; font-size:11px">
                    <span>БОНУС: <span id="p-m" style="color:var(--accent)">x1.0</span></span>
                    <span>LVL: <span id="p-l">1</span></span>
                </div>
            </div>
        </div>

        <div class="glass" style="text-align:center">
            <select id="g-sel" onchange="updUI()">
                <option value="dice">🎲 Кубик (x2.0)</option>
                <option value="wheel">🎡 Колесо (До x5.0)</option>
                <option value="bj">🃏 Блекджек (x2.0)</option>
            </select>

            <div id="ui-w" style="display:none">
                <div class="wheel-wrap"><div class="marker"></div><div id="w-obj" class="wheel-main"></div></div>
            </div>

            <div id="ui-bj" style="display:none">
                <div style="background:rgba(0,0,0,0.3); border-radius:15px; padding:10px; margin:10px 0; border:1px dashed var(--success)">
                    <div id="bj-dc"></div>
                    <hr style="opacity:0.1; margin:8px 0">
                    <div id="bj-pc"></div>
                </div>
                <div id="bj-b" style="display:none; gap:10px; margin-bottom:10px">
                    <button class="btn" style="flex:1" onclick="bjDo('hit')">ЩЕ</button>
                    <button class="btn" style="flex:1; background:var(--error)" onclick="bjDo('stand')">СТОП</button>
                </div>
            </div>

            <input type="number" id="bet-a" value="100">
            <button class="btn" id="b-play" onclick="play()">ГРАТИ</button>
            <div id="g-stat" style="margin-top:15px; font-weight:900; min-height:20px"></div>
        </div>
    </div>

    <div id="v-shop" class="page" style="display:none">
        <div class="glass">
            <h3 style="margin-top:0">🛒 МАГАЗИН</h3>
            <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; margin-bottom:10px">
                <div><b>Яйце Пета</b><br><small>Common-Legendary</small></div>
                <button class="btn" style="width:auto; padding:8px 15px" onclick="buy('egg', 2500)">2.5k</button>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.05); padding:15px; border-radius:15px">
                <div><b>Корм</b><br><small>+1 Рівень Пета</small></div>
                <button class="btn" style="width:auto; padding:8px 15px; background:var(--success)" onclick="buy('food', 1000)">1k</button>
            </div>
        </div>
    </div>

    <div id="v-top" class="page" style="display:none">
        <div class="glass">
            <h3 style="margin-top:0; color:var(--accent)">🏆 ТОП МАГНАТІВ</h3>
            <div id="leaderboard">Крутимо сервер...</div>
        </div>
    </div>
</div>

<nav>
    <div class="nav-tab active" onclick="tab('main', this)">🎮<br>ГРА</div>
    <div class="nav-tab" onclick="tab('shop', this)">🛒<br>ШОП</div>
    <div class="nav-tab" onclick="tab('top', this)">🏆<br>ТОП</div>
</nav>

<script>
// ТВОЇ ДАНІ FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyD7F2lrec5XWyMWG7J6",
  authDomain: "bearscasino-bcded.firebaseapp.com",
  projectId: "bearscasino-bcded",
  storageBucket: "bearscasino-bcded.appspot.com",
  messagingSenderId: "826765969101",
  appId: "1:826765969101:web:ee5e5d3",
  databaseURL: "https://bearscasino-bcded-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe?.user || { id: 'local_user', first_name: 'Гравець' };
const userId = user.id;

// СТАН ГРИ
let s = { b: 5000, x: 0, r: 1, name: user.first_name, p: null };
const P_DB = [
    {n:'Жабка', s:'🐸', r:'Common', m:1.1, c:'#94a3b8'}, 
    {n:'Котик', s:'🐱', r:'Rare', m:1.6, c:'#3b82f6'}, 
    {n:'Дракон', s:'🐲', r:'Legendary', m:4.5, c:'#ffb703'}
];

// ЗАВАНТАЖЕННЯ ОНЛАЙН
db.ref('players/' + userId).on('value', (snap) => {
    if(snap.exists()) { s = snap.val(); ren(); }
    else { save(); }
});

// ТОП ГРАВЦІВ
db.ref('players').orderByChild('b').limitToLast(10).on('value', (snap) => {
    let list = [];
    snap.forEach(c => { list.push(c.val()); });
    list.sort((a,b) => b.b - a.b);
    document.getElementById('leaderboard').innerHTML = list.map((p,i) => 
        `<div class="leader-item" style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05)">
            <span>${i+1}. ${p.name}</span><b>${Math.floor(p.b).toLocaleString()} BB</b>
        </div>`).join('');
});

function save() { db.ref('players/' + userId).update(s); }

function tab(id, el) {
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('v-'+id).style.display = 'block';
    el.classList.add('active');
}

function ren() {
    document.getElementById('bal-val').textContent = Math.floor(s.b).toLocaleString();
    document.getElementById('u-name').textContent = s.name.toUpperCase();
    document.getElementById('u-rank').textContent = "РАНГ: " + s.r;
    document.getElementById('xp-f').style.width = (s.x / (s.r * 1000) * 100) + "%";

    if(s.p) {
        document.getElementById('p-img').textContent = s.p.s;
        document.getElementById('p-name').textContent = s.p.n;
        document.getElementById('p-l').textContent = s.p.lvl;
        document.getElementById('p-m').textContent = "x" + (s.p.m + (s.p.lvl * 0.1)).toFixed(1);
        const tag = document.getElementById('p-rarity');
        tag.textContent = s.p.r;
        tag.style.background = s.p.c;
    }
}

// ЛОГІКА МАГАЗИНУ
function buy(type, price) {
    if(s.b < price) return alert("Немає грошей!");
    s.b -= price;
    if(type === 'egg') {
        let r = Math.random();
        let pet = r > 0.95 ? P_DB[2] : r > 0.7 ? P_DB[1] : P_DB[0];
        s.p = { ...pet, lvl: 1 };
        alert("🐣 Тобі випав: " + pet.n);
    } else if(s.p) {
        s.p.lvl++;
        alert("🍖 Пет став сильнішим!");
    } else {
        s.b += price;
        alert("Спочатку купи яйце!");
    }
    save();
}

// ІГРИ
let bj = { a: false, p: [], d: [], bt: 0 };
const c = () => Math.floor(Math.random()*10)+2;
const sum = (a) => a.reduce((x,y)=>x+y,0);

function updUI() {
    document.getElementById('ui-w').style.display = document.getElementById('g-sel').value==='wheel'?'block':'none';
    document.getElementById('ui-bj').style.display = document.getElementById('g-sel').value==='bj'?'block':'none';
}

function play() {
    let bt = parseInt(document.getElementById('bet-a').value);
    if(bt <= 0 || bt > s.b) return alert("Недостатньо BB!");
    let g = document.getElementById('g-sel').value;

    if(g === 'dice') {
        resolve(Math.random() > 0.6, bt, 2, "Кубик");
    } else if(g === 'wheel') {
        let w = document.getElementById('w-obj');
        let deg = 3600 + Math.floor(Math.random()*360);
        w.style.transform = `rotate(${deg}deg)`;
        document.getElementById('b-play').disabled = true;
        setTimeout(() => {
            document.getElementById('b-play').disabled = false;
            let n = deg % 360;
            let m = (n<90)?0 : (n<180)?2 : (n<270)?1.5 : 5;
            resolve(m > 0, bt, m, "Колесо");
        }, 4000);
    } else if(g === 'bj') {
        bj = { a:true, p:[c(),c()], d:[c()], bt:bt };
        document.getElementById('bj-b').style.display='flex';
        document.getElementById('b-play').style.display='none';
        renBJ();
    }
}

function renBJ() {
    document.getElementById('bj-pc').innerHTML = bj.p.map(x=>`<div class="card-ui">${x}</div>`).join('');
    document.getElementById('bj-dc').innerHTML = `<div class="card-ui">${bj.d[0]}</div><div class="card-ui" style="background:#444">?</div>`;
    if(sum(bj.p)>21) resolve(false, bj.bt, 0, "ПЕРЕБІР");
}

function bjDo(a) {
    if(a==='hit') { bj.p.push(c()); renBJ(); }
    else {
        while(sum(bj.d)<17) bj.d.push(c());
        let ps=sum(bj.p), ds=sum(bj.d);
        resolve(ds>21 || ps>ds, bj.bt, 2, "Блекджек");
    }
}

function resolve(win, bt, m, name) {
    bj.a = false;
    document.getElementById('bj-b').style.display='none';
    document.getElementById('b-play').style.display='block';
    
    if(win) {
        let mult = s.p ? (s.p.m + (s.p.lvl * 0.1)) : 1;
        let gain = Math.floor((bt * m - bt) * mult);
        s.b += gain; s.x += Math.floor(bt/5);
        document.getElementById('g-stat').innerHTML = `<span style="color:var(--success)">+${gain} BB ✨</span>`;
    } else {
        s.b -= bt;
        document.getElementById('g-stat').innerHTML = `<span style="color:var(--error)">-${bt} BB ❌</span>`;
    }
    
    if(s.x >= s.r * 1000) { s.x = 0; s.r++; }
    save();
}

updUI();
</script>
</body>
</html>
